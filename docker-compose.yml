services:
  db:
    image: mysql:8.0
    container_name: railgo_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: railgo_db
      MYSQL_USER: railgo_user
      MYSQL_PASSWORD: railgo_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database/migrations/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: railgo_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5001
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: railgo_user
      DB_PASSWORD: railgo_pass
      DB_NAME: railgo_db
      JWT_SECRET: railgo_super_secret_jwt_key_2024
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production
    ports:
      - "5001:5001"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: railgo_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5001/api
    ports:
      - "3000:3000"

volumes:
  db_data:
